<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 思源宋体 CN Heavy,serif;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            padding-top: 10px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            border: 2px solid #000;
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid #000;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .modal-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #000;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-confirm {
            background-color: #ff4444;
            border-color: #cc0000;
            color: #fff;
        }

        .btn-confirm:hover {
            background-color: #ff6666;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
        }

        .btn-cancel {
            background-color: #666;
            border-color: #444444;
            color: #fff;
        }

        .btn-cancel:hover {
            background-color: #888;
            color: #fff;
            box-shadow: 0 0 15px rgba(102, 102, 102, 0.6);
        }
    </style>
</head>
<body>
    <div class="timer-display" id="timerDisplay">00:00:00:00</div>
    
    <div class="controls">
        <button class="btn" id="startBtn">开始</button>
        <button class="btn" id="resetBtn">重置</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-text">确定要重置计时器吗？</div>
            <div class="modal-buttons">
                <button class="btn btn-confirm" id="confirmBtn">确定</button>
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
            </div>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        function formatTime(time) {
            const hours = Math.floor(time / 3600000);
            const minutes = Math.floor((time % 3600000) / 60000);
            const seconds = Math.floor((time % 60000) / 1000);
            const milliseconds = Math.floor((time % 1000) / 10);

            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds).padStart(2, '0')}`;
        }

        function updateDisplay() {
            const currentTime = Date.now();
            const totalElapsed = elapsedTime + (currentTime - startTime);
            timerDisplay.textContent = formatTime(totalElapsed);
        }

        function startTimer() {
            if (!isRunning) {
                startTime = Date.now();
                timerInterval = setInterval(updateDisplay, 10);
                isRunning = true;
                startBtn.textContent = '暂停';
            } else {
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                isRunning = false;
                startBtn.textContent = '开始';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            startBtn.textContent = '开始';
            timerDisplay.textContent = '00:00:00:00';
            modalOverlay.classList.remove('active');
        }

        function showResetModal() {
            modalOverlay.classList.add('active');
        }

        startBtn.addEventListener('click', startTimer);
        
        resetBtn.addEventListener('click', showResetModal);
        
        confirmBtn.addEventListener('click', resetTimer);
        
        cancelBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        // 点击弹窗外部关闭弹窗
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });

        // 初始化显示
        timerDisplay.textContent = '00:00:00:00';
    </script>
</body>
</html>
